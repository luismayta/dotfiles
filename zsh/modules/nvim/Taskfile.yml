---
version: "3"

tasks:
  lint:
    run: once
    dir: "{{.TASKFILE_DIR}}"
    desc: "Check Lua syntax with luac -p"
    cmds:
      - find data -name '*.lua' -exec luac -p {} +
    silent: true

  build:
    run: once
    dir: "{{.TASKFILE_DIR}}"
    desc: "Auto-import plugin specs into plugins/init.lua"
    cmds:
      - nvim --headless -c "lua vim.g.autoimport_output='{{.TASKFILE_DIR}}/data/lua/plugins/init.lua'" -c "luafile {{.TASKFILE_DIR}}/data/scripts/auto-import.lua" -c "qa"
    silent: true

  backup:
    run: once
    dir: "{{.TASKFILE_DIR}}"
    desc: "Backup ~/.config/nvim/ to data/ (dry-run by default)"
    cmds:
      - cmd: "nvim::backup"
        silent: true
      - cmd: "nvim::backup --apply"
        silent: false
        ignore_error: true
    silent: true
