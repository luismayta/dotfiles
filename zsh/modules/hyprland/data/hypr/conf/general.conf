# ==================
# MONITOR CONFIG
# ==================
# Monitors from existing configuration
monitor=,preferred,auto,auto

# ==================
# INPUT CONFIG
# ==================
input {
    kb_layout = us
    numlock_by_default = true
}

# ==================
# GENERAL LAYOUT
# ==================
general {
    gaps_in = 12
    gaps_out = 24
    border_size = 2

    layout = dwindle

    col.active_border = $green $lavender $pink 45deg
    col.inactive_border = rgba($surface0Alpha7f)
}

# ==================
# SCROLLING LAYOUT
# ==================
scrolling {
    fullscreen_on_one_column = false
}

# ==================
# DECORATION
# ==================
decoration {
    rounding = 12

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 30
        render_power = 5
        offset = 0 5
        color = rgba(00000070)
    }

    blur {
        enabled = true
        size = 15
        passes = 2
        ignore_opacity = true

        noise = 0.08
        contrast = 1.5

        xray = false
        new_optimizations = true
    }
}

# ==================
# ANIMATIONS
# ==================
animations {
    enabled = true

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsIn, 1, 7, myBezier, slide
    animation = windowsOut, 1, 7, myBezier, slide
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, myBezier, slide
}

# ==================
# GROUP
# ==================
group {
    col.border_active = $green $lavender $pink 45deg
    col.border_inactive = rgba($surface0Alpha7f)

    groupbar {
        font_family = Rubik
        font_size = 14
        font_weight_active = bold

        height = 24
        gaps_in = 8
        gaps_out = 8

        indicator_height = 0

        gradients = true
        gradient_rounding = 6
        gradient_round_only_edges = false

        col.active = rgba($baseAlphacf)
        col.inactive = rgba($baseAlphacf) 

        text_color = $green
        text_color_inactive = $subtext0
    }
}

# ==================
# LAYOUTS
# ==================
dwindle {
    preserve_split = true
}

master {
    mfact = 0.5
}

# ==================
# MISC
# ==================
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vrr = 1
}

# ==================
# RENDER
# ==================
render {
  cm_sdr_eotf = 2
}
