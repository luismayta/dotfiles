## CROSS-SHELL PROMPT
##
## Hadenlabs starship configuration
#prompt global settings
########################################

## Core Settings
## -------------

"$schema" = 'https://starship.rs/config-schema.json'

format = "$all"

# Inserts a blank line between shell prompts
add_newline = false

# Wait 10 milliseconds for starship to check files under the current directory.
scan_timeout = 10

## Shell & User
## -------------

# Shell indicator for each shell type
[shell]
fish_indicator = "ūüźü"
zsh_indicator = "ūüźļ"
bash_indicator = "ūüźö"
powershell_indicator = "ÔĎ†_"
disabled = false

[username]
format = "[$user]($style) in "
disabled = false
show_always = true
style_user = "blue bold"
style_root = "red bold"

# Prompt character and color
[character]
format = "$symbol "
success_symbol = "[->](bold green)" # The "success_symbol" segment is being set to "‚ěú" with the color "bold green"
error_symbol = "[ūü§ģ ](bold red)"     # The "success_symbol" segment is being set to "‚ěú" with the color "bold green"

## Directory
## ----------

[directory]
format = "[$path]($style)[$read_only]($read_only_style) "
home_symbol = "ūüŹ†"
read_only = "ūüĒí"
read_only_style = "red"
style = "bold cyan"
truncation_length = 2
truncate_to_repo = true
truncation_symbol = ".../"
repo_root_style = "purple"
fish_style_pwd_dir_length = 1
use_logical_path = true

[directory.substitutions]
"/Volumes/Data/projects" = "ūüźļ"

## Git
## ---

[git_branch]
symbol = "ūüĆĪ "
truncation_symbol = ""

[git_status]
conflicted = "‚öĒÔłŹ "
ahead = "ūüŹéūüí®"
behind = "ūüėį"
diverged = "ūüėĶ"
untracked = "ūü§∑"
stashed = "ūüď¶"
modified = "ūüďĚ"
staged = '[++\($count\)](green)'
renamed = "ūüĎÖ"
deleted = "ūüóĎ"

[git_commit]
commit_hash_length = 4
tag_symbol = "ūüĒĖ "

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = "[ūüćí PICKING](bold red)"

# Display symbol for remote Git server (GitHub/GitLab/Bitbucket/etc.)
[custom.giturl]
disabled = false
description = "Display symbol for remote Git server"
command = """
REMOTE=$(command git ls-remote --get-url 2> /dev/null)
if [[ "$REMOTE" =~ "github" ]]; then
    SYMBOL="Ôāõ"
elif [[ "$REMOTE" =~ "gitlab" ]]; then
    SYMBOL="ÔäĖ"
elif [[ "$REMOTE" =~ "bitbucket" ]]; then
    SYMBOL="ÔÖĪ"
elif [[ "$REMOTE" =~ "git" ]]; then
    SYMBOL="Óúā"
else
    SYMBOL="Ôáí"
fi
echo "$SYMBOL "
"""
when = 'git rev-parse --is-inside-work-tree 2> /dev/null'
shell = ["bash", "--noprofile", "--norc"]
format = "$output "

[custom.githash]
disabled = false
description = "Display git hash"
command = "git rev-parse --short HEAD"
when = 'git rev-parse --is-inside-work-tree 2> /dev/null'
shell = ["bash", "--noprofile", "--norc"]
format = "$output "

## Cloud & Infrastructure
## ---------------------

[kubernetes]
disabled = false
symbol = "‚õĶ "
format = '[$symbol$context( \($namespace\))]($style) '

[kubernetes.context_aliases]
docker-desktop = "ūüź≥"
# OpenShift contexts carry the namespace and user in the kube context: `namespace/name/user`:
".*/openshift-cluster/.*" = "openshift"

# Or better, to rename every OpenShift cluster at once:
".*/(?P<cluster>[\\w-]+)/.*" = "$cluster"

"k8s:(?P<cluster_name>.*)" = "k8s: $cluster_name"

# talos
".*@talos-(?P<cluster_name>.*)" = "talos: $cluster_name"

# infosis

"infosis:k8s:(?P<cluster_name>.*)" = "infosis: $cluster_name"

# aws

"arn:aws:.*:cluster/(?P<cluster_name>.*)" = "AWS: $cluster_name"

"eks:cluster:(?P<cluster_name>.*)" = "eks: $cluster_name"

[aws]
format = "on [$symbol $region $profile]($style) "
style = "bold blue"
symbol = "‚õÖ"

[aws.region_aliases]
ap-southeast-2 = "au"
us-east-1 = "va"

[docker_context]
disabled = true

## Languages & Runtimes
## --------------------

[golang]
style = "bold cyan"
symbol = "[Óėß](cyan)"
format = "[$symbol $version]($style) "

[python]
pyenv_version_name = true
detect_extensions = []

[lua]
format = 'via [ūüĆē $version](bold blue) '

[dart]
format = 'via [ūüĒį $version](bold red) '

[deno]
format = 'via [ūü¶ē $version](green bold) '

[helm]
style = "bold fg:bright-cyan bg:#5a6374"
format = "[ ÓāĶ ](fg:white bg:#5a6374)[$symbol$version]($style)"

## Tools
## -----

[terraform]
disabled = false
detect_extensions = ["tf", "tfplan", "tfstate", "hcl"]
format = " [$symbol$workspace]($style)"

# Disable the package module, hiding it from the prompt completely
[package]
disabled = false

## System
## ------

## Memory
[memory_usage]
disabled = false
style = "bold dimmed green"
threshold = -1
format = '\[$symbol[$ram( | $swap)]($style)\]'

[cmd_duration]
min_time = 1_000

# doc: https://starship.rs/config/#jobs
[jobs]
symbol = "ūüŹÉÔłŹ"
threshold = 4
format = "[$symbol_threshold $number_threshold]($style) "

[sudo]
disabled = false

## Environment
## -----------

[env_var.AWS_PROFILE_NAME]
symbol = "‚õÖ"
variable = "AWS_PROFILE_NAME"
default = "profile name"
style = "bold blue"

[env_var.TMUX]
default = 'tmux'
style = 'bold green'
format = '[ūü•∑ ]($style)'

[env_var.VISUAL]
format = ""
default = "nvim"

[env_var.EDITOR]
format = ""
default = "nvim"

