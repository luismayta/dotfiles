[[mouse.bindings]]
action = "PasteSelection"
mouse = "Middle"

[env]
TERM = "xterm-256color"
TMUX_SOCKET = "alacritty"

[font]
size = 16.0

[font.normal]
family = "JetBrainsMono Nerd Font"

[font.bold]
family = "JetBrainsMono Nerd Font"

[font.italic]
family = "JetBrainsMono Nerd Font"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"

[scrolling]
history = 10000
multiplier = 5

[window]
opacity = 0.8
padding.x = 4
padding.y = 4
decorations_theme_variant = "Dark"
dynamic_padding = true

[cursor]
style = "Block"
vi_mode_style = "Beam"

[terminal]
osc52 = "OnlyCopy"

[keyboard]
bindings = [
  { key = "Return", mods = "Shift", chars = "\n" },
  { key = "Return", mods = "Control", chars = "\n" },
]
