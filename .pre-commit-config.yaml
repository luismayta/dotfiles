ci:
  autoupdate_schedule: monthly

default_language_version:
  node: 24.11.1

default_stages:
  - pre-commit
exclude: >
  (?x)^(
    ^(\/|)vendor\/(.*?)$|
    .+\.node_modules\/.*$|
    .+\.external_modules.*$|
    .+\.terraform.*$|
    pnpm-lock.yaml|
    .+\.venv.*$|
    .+\.lock$|
    .+\.mdx$|
  )$

repos:
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        args:
          - --ignore-words=.ci/linters/.codespell-ignores
        exclude: >
          (?x)^(
          AGENTS.md|
          CHANGELOG.md|
          skills/.*/SKILL\.md$|
          skills/.*/README\.md$|
          app/components/sections\/.*$|
          .claude/skills\/.*$|
          .agents/skills\/.*$|
          .opencode/skills\/.*$|
          zsh/modules/ai/data/patterns\/.*$|
          app/data\/.*$|
          app/ia/datasets\/.*$|
          app/routes\/.*$|
          data/patterns\/.*$|
          openspec\/.*$|
          go.mod|
          go.sum|
          openapi.yaml|
          provision/prompts\/.*$|
          openspec\/.*$|
          docs/prompts/openspec\/.*$|
          .+\.lock$|
          .+\.mdx$|
          .+\.node_modules\/.*$|
          .+\.sops.*$|
          .+\.vendor\/.*$|
          src/context/humans\.md$|
          )$
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.24.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ["@hadenlabs/commitlint-config-core"]
        args:
          - --config=.ci/linters/.commitlintrc.json
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: detect-private-key
        files: ^(?!\.?git-crypt)
        exclude: >
          (?x)^(
            .+\.gitleaks.toml$|
            test/fixtures/keys/.*-test.*$
          )$
      - id: check-merge-conflict
      - id: check-added-large-files
        files: ^tf|-|\.(py|env|yml|yaml)$
      - id: check-case-conflict
      - id: check-json
        exclude: >
          (?x)^(
            .zed/tasks.json$|
            zsh/modules/zed/data/keymap.json$|
            zsh/modules/zed/data/settings.json$|
          )$
      - id: check-xml
      - id: check-yaml
        args:
          - --allow-multiple-documents
        exclude: >
          (?x)^(
            .*\.tpl\.yaml$
          )$
      - id: fix-byte-order-marker
      - id: check-ast
      - id: debug-statements
      - id: check-docstring-first
      - id: requirements-txt-fixer
      - id: check-symlinks
      - id: file-contents-sorter
      - id: sort-simple-yaml

  - repo: https://github.com/tcort/markdown-link-check
    rev: v3.14.2
    hooks:
      - id: markdown-link-check
        args:
          - --config=.ci/linters/markdown-link-config.json
        exclude: >
          (?x)^(
          .+\.docs/env-vars.md$|
          .+\.tpl.md$|
          data/patterns\/.*$|
          docs/env-vars.md$|
          docs\/include\/terraform.md$|
          docs/opencode/commands/.*\.md$|
          zsh/modules/ai/data/patterns\/.*$|
          )$

  - repo: https://github.com/hadenlabs/pre-commit-hooks
    rev: 0.6.0
    hooks:
      - id: do-not-commit

      - id: shellcheck
        exclude: >
          (?x)^(
            .+\.provision/git/hooks/prepare-commit-msg$|
            .+\.tpl.sh$|
            .+\.envrc$|
            bin\/.*$
          )$
        args:
          - --exclude=SC1072,SC1073,SC2068
      - id: gitleaks
        name: gitleaks
        entry: gitleaks git --pre-commit
        language: system
        pass_filenames: false
        args:
          - --verbose
      - id: hadolint
        args:
          - --config=.ci/linters/.hadolint.yaml